            --primary-color: #1a73e8;
            --primary-hover: #1557b0;
            --success-color: #28a745;
            --error-color: #dc3545;
            --warning-color: #f44336;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text-main);
        }

        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: 95%;
            max-width: 550px;
            text-align: center;
            position: relative;
        }

        .version-badge {
            position: absolute;
            top: 10px;
            right: 15px;
            color: var(--text-muted);
            font-size: 0.65rem;
            font-weight: 600;
            opacity: 0.6;
        }

        h1 { 
            color: var(--primary-color); 
            margin-top: 0.5rem;
            margin-bottom: 1rem;
            font-size: 1.6rem;
        }

        .screen { display: none; animation: fadeIn 0.4s ease; }
        .active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.2s;
            margin-top: 1rem;
            box-shadow: 0 2px 5px rgba(26, 115, 232, 0.2);
        }

        .btn:hover { 
            background-color: var(--primary-hover);
            box-shadow: 0 4px 8px rgba(26, 115, 232, 0.3);
            transform: translateY(-1px);
        }

        .btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        input[type="text"] {
            width: 100%;
            box-sizing: border-box;
            padding: 12px 16px;
            margin: 1rem 0;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1.1rem;
            outline: none;
        }

        input[type="text"]:focus { border-color: var(--primary-color); }
        input[type="text"]:disabled { background-color: #f5f5f5; }

        .progress-container {
            width: 100%;
            height: 4px;
            background-color: #eee;
            border-radius: 2px;
            margin-bottom: 1.5rem;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--primary-color);
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-info { 
            color: var(--text-muted); 
            font-size: 0.85rem;
            margin-bottom: 1rem; 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .timer-container {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 1rem;
        }

        .timer-svg {
            transform: rotate(-90deg);
            width: 80px;
            height: 80px;
        }

        .timer-circle-bg {
            fill: none;
            stroke: #eee;
            stroke-width: 6;
        }

        .timer-circle-progress {
            fill: none;
            stroke: var(--primary-color);
            stroke-width: 6;
            stroke-linecap: round;
            stroke-dasharray: 226.08;
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 1s linear, stroke 0.3s;
        }

        .timer-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--text-main);
        }

        .timer-circle-progress.warning {
            stroke: var(--warning-color);
        }

        .word-display { 
            font-family: 'Lao Sangam MN Custom', 'Lao Sangam MN', 'Phetsarath OT', 'Sayssettha OT', sans-serif;
            font-size: 2.8rem; 
            font-weight: bold; 
            margin: 1.5rem 0; 
            color: #222;
            word-break: break-all;
        }

        .feedback { 
            margin-top: 0.5rem; 
            font-weight: bold; 
            min-height: 3rem;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.4;
        }

        .correct { background-color: #e8f5e9; color: var(--success-color); }
        .incorrect { background-color: #ffebee; color: var(--error-color); }
        .timeout { background-color: #fff3cd; color: #856404; }

        .result-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .stat-card {
            background-color: #f8f9fa;
            padding: 1rem;
            border-radius: 10px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-color);
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .history-container {
            margin-top: 2rem;
            text-align: left;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 10px;
        }

        .history-item {
            padding: 8px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }

        .history-item:last-child { border-bottom: none; }
        .history-lao { font-weight: bold; font-family: 'Lao Sangam MN Custom', 'Lao Sangam MN', sans-serif; }
        .history-ans { color: var(--text-muted); }
        .history-status { font-weight: bold; }
        .status-correct { color: var(--success-color); }
        .status-incorrect { color: var(--error-color); }

        .hint-text {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
            font-style: italic;
            min-height: 1rem;
        }

        .sending-msg { font-size: 0.85rem; color: #666; margin-top: 10px; }

        @media (max-width: 480px) {
            .container { padding: 1.5rem; }
            .word-display { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="version-badge">Ver0.5+</div>

    <div id="start-screen" class="screen active">
        <h1>ラオス語単語クイズ</h1>
        <p style="color: var(--text-muted); margin-bottom: 2rem; font-size: 0.9rem;">農業関連のラオス語単語を学習しましょう</p>
        <div id="loading-msg" style="margin-bottom: 1rem; font-weight: bold; color: var(--primary-color);">CSVファイルを読み込んでいます...</div>
        <div style="background: #eef4ff; padding: 1rem; border-radius: 8px; margin-bottom: 2rem; text-align: left; font-size: 0.85rem;">
            <p style="margin: 0 0 0.5rem 0;"><strong>ルール:</strong></p>
            <ul style="margin: 0; padding-left: 1.2rem;">
                <li>全10問のランダム出題</li>
                <li>日本語（漢字・ひらがな）で回答</li>
                <li><strong>入力中はタイマーが停止します</strong></li>
                <li><strong>制限時間: 1問20秒</strong></li>
                <li><strong>Enterキーで回答・次へ進む</strong></li>
            </ul>
        </div>
        <button class="btn" id="start-btn" onclick="startQuiz()" disabled>クイズを開始する</button>
    </div>

    <div id="quiz-screen" class="screen">
        <div class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
        
        <div class="question-info">
            <span>第 <span id="current-num">1</span> 問 / 10</span>
            <span id="current-score-display">正解: 0</span>
        </div>

        <div class="timer-container">
            <svg class="timer-svg" viewBox="0 0 80 80">
                <circle class="timer-circle-bg" cx="40" cy="40" r="36"></circle>
                <circle id="timer-progress" class="timer-circle-progress" cx="40" cy="40" r="36"></circle>
            </svg>
            <div id="timer-text" class="timer-text">20</div>
        </div>

        <div class="word-display" id="word-target">---</div>
        
        <input type="text" id="answer-input" placeholder="日本語を入力..." autocomplete="off" spellcheck="false">
        
        <div id="feedback" class="feedback"></div>
        <div class="hint-text" id="hint-text"></div>
        
        <div id="action-area">
            <button class="btn" id="submit-btn" onclick="checkAnswer()">回答する</button>
            <button class="btn" id="next-btn" style="display:none;" onclick="nextQuestion()">次へ進む (Enter)</button>
        </div>
    </div>

    <div id="result-screen" class="screen">
        <h1>結果発表</h1>
        <div class="result-stats">
            <div class="stat-card">
                <div class="stat-value"><span id="score">0</span> / 10</div>
                <div class="stat-label">正解数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value"><span id="accuracy">0</span>%</div>
                <div class="stat-label">正解率</div>
            </div>
        </div>
        <p id="result-message" style="font-size: 1rem; margin-bottom: 1rem;"></p>
        
        <div id="sending-msg" class="sending-msg">結果を送信中...</div>

        <div class="history-container" id="history-list">
            <!-- 履歴がここに挿入されます -->
        </div>
        
        <button class="btn" onclick="location.reload()">もう一度挑戦する</button>
    </div>
</div>

<script>
    // 設定
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxTNUxdK4cty9MRNHisjGtSfiYm9qWl0_bYHa9LEHOWKi3mQD5-0Txw1W5oMIpvgLsPkA/exec"; 
    const TOTAL_QUESTIONS = 10;
    const TIME_LIMIT = 20;
    const CIRCLE_CIRCUMFERENCE = 226.08;

    let wordDict = {};
    let uniqueLaoWords = [];
    let currentQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let timerInterval = null;
    let timeRemaining = TIME_LIMIT;
    let quizHistory = [];
    let deviceId = localStorage.getItem('quiz_device_id') || 'Device-' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('quiz_device_id', deviceId);

    // ページ読み込み時にCSVを読み込む
    window.onload = async () => {
        try {
            const response = await fetch('wordlist.csv');
            if (!response.ok) throw new Error('CSVファイルの読み込みに失敗しました。');
            
            const text = await response.text();
            parseCSV(text);
            
            document.getElementById('loading-msg').textContent = 'CSVの読み込みが完了しました。';
            document.getElementById('start-btn').disabled = false;
        } catch (error) {
            document.getElementById('loading-msg').textContent = 'エラー: ' + error.message + ' (wordlist.csvを確認してください)';
            document.getElementById('loading-msg').style.color = 'red';
        }
    };

    function parseCSV(text) {
        const lines = text.split(/\r?\n/);
        wordDict = {};
        
        for (let i = 1; i < lines.length; i++) {
            const line = lines[i].trim();
            if (!line) continue;
            
            const parts = line.split(',');
            if (parts.length < 3) continue;
            
            const kanji = parts[0].trim();
            const kana = parts[1].trim();
            let lao = parts[2].trim().replace(/^\s+|\s+$/g, '');
            
            if (!wordDict[lao]) {
                wordDict[lao] = new Set();
            }
            wordDict[lao].add(normalizeText(kanji));
            wordDict[lao].add(normalizeText(kana));
        }
        uniqueLaoWords = Object.keys(wordDict);
    }

    function normalizeText(text) {
        return text.replace(/[！-～]/g, function(s) {
            return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);
        }).replace(/\s+/g, '').toLowerCase();
    }

    function startQuiz() {
        if (uniqueLaoWords.length === 0) return;
        currentQuestions = [...uniqueLaoWords].sort(() => 0.5 - Math.random()).slice(0, TOTAL_QUESTIONS);
        currentIndex = 0;
        score = 0;
        quizHistory = [];
        showScreen('quiz-screen');
        showQuestion();
    }

    function showQuestion() {
        const lao = currentQuestions[currentIndex];
        document.getElementById('current-num').textContent = currentIndex + 1;
        document.getElementById('word-target').textContent = lao;
        document.getElementById('current-score-display').textContent = `正解: ${score}`;
        
        const input = document.getElementById('answer-input');
        input.value = '';
        input.disabled = false;
        
        const feedback = document.getElementById('feedback');
        feedback.textContent = '';
        feedback.className = 'feedback';
        
        document.getElementById('hint-text').textContent = '';
        document.getElementById('submit-btn').style.display = 'inline-block';
        document.getElementById('next-btn').style.display = 'none';
        
        updateProgressBar();
        input.focus();
        
        timeRemaining = TIME_LIMIT;
        updateTimerUI();
        startTimer();
    }

    function updateProgressBar() {
        const progress = (currentIndex / TOTAL_QUESTIONS) * 100;
        document.getElementById('progress-bar').style.width = `${progress}%`;
    }

    function startTimer() {
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            // 入力欄が空の場合のみタイマーを進める
            const inputVal = document.getElementById('answer-input').value.trim();
            if (inputVal === "") {
                timeRemaining--;
                updateTimerUI();
                if (timeRemaining <= 0) {
                    clearInterval(timerInterval);
                    handleTimeout();
                }
            }
        }, 1000);
    }

    function updateTimerUI() {
        const timerText = document.getElementById('timer-text');
        const timerProgress = document.getElementById('timer-progress');
        timerText.textContent = timeRemaining;
        const offset = CIRCLE_CIRCUMFERENCE - (timeRemaining / TIME_LIMIT) * CIRCLE_CIRCUMFERENCE;
        timerProgress.style.strokeDashoffset = offset;
        if (timeRemaining <= 5) timerProgress.classList.add('warning');
        else timerProgress.classList.remove('warning');
    }

    function handleTimeout() {
        const lao = currentQuestions[currentIndex];
        const correctAnswers = wordDict[lao];
        const correctText = Array.from(correctAnswers).join('」または「');
        const feedback = document.getElementById('feedback');
        
        feedback.textContent = `時間切れ！ 正解は「${correctText}」でした`;
        feedback.className = 'feedback timeout';
        document.getElementById('hint-text').textContent = 'Enterキーで次へ進みます';
        
        quizHistory.push({ lao: lao, correct: correctText, status: 'timeout' });
        
        document.getElementById('submit-btn').style.display = 'none';
        document.getElementById('next-btn').style.display = 'inline-block';
        document.getElementById('answer-input').disabled = true;
    }

    function checkAnswer() {
        clearInterval(timerInterval);
        const inputElement = document.getElementById('answer-input');
        const rawInput = inputElement.value.trim();
        if (!rawInput) return;

        const normalizedInput = normalizeText(rawInput);
        const lao = currentQuestions[currentIndex];
        const correctAnswers = wordDict[lao];
        const correctText = Array.from(correctAnswers).join('」または「');
        const feedback = document.getElementById('feedback');
        
        let isCorrect = false;
        for (let ans of correctAnswers) {
            if (normalizedInput === ans) {
                isCorrect = true;
                break;
            }
        }
        
        if (isCorrect) {
            feedback.textContent = '正解です！素晴らしい！';
            feedback.className = 'feedback correct';
            score++;
            quizHistory.push({ lao: lao, correct: correctText, status: 'correct' });
        } else {
            feedback.textContent = `不正解... 正解は「${correctText}」でした`;
            feedback.className = 'feedback incorrect';
            quizHistory.push({ lao: lao, correct: correctText, status: 'incorrect' });
        }
        
        document.getElementById('hint-text').textContent = 'Enterキーで次へ進みます';
        document.getElementById('submit-btn').style.display = 'none';
        document.getElementById('next-btn').style.display = 'inline-block';
        inputElement.disabled = true;
        document.getElementById('current-score-display').textContent = `正解: ${score}`;
    }

    function nextQuestion() {
        currentIndex++;
        if (currentIndex < TOTAL_QUESTIONS) {
            showQuestion();
        } else {
            document.getElementById('progress-bar').style.width = '100%';
            setTimeout(showResult, 300);
        }
    }

    function showResult() {
        clearInterval(timerInterval);
        document.getElementById('score').textContent = score;
        const accuracy = Math.round((score / TOTAL_QUESTIONS) * 100);
        document.getElementById('accuracy').textContent = accuracy;
        
        let message = "";
        if (accuracy === 100) message = "完璧です！全問正解おめでとうございます！";
        else if (accuracy >= 80) message = "素晴らしい成績です！その調子で頑張りましょう。";
        else if (accuracy >= 60) message = "合格点です。さらに上を目指しましょう！";
        else message = "もう少し練習が必要かもしれません。もう一度挑戦してみましょう！";
        document.getElementById('result-message').textContent = message;

        // 履歴の表示
        const historyList = document.getElementById('history-list');
        historyList.innerHTML = '<h3 style="font-size: 1rem; margin-top: 0;">今回の問題と正解:</h3>';
        quizHistory.forEach((item, idx) => {
            const div = document.createElement('div');
            div.className = 'history-item';
            const statusText = item.status === 'correct' ? '○' : (item.status === 'timeout' ? '△' : '×');
            const statusClass = item.status === 'correct' ? 'status-correct' : 'status-incorrect';
            div.innerHTML = `
                <div>
                    <span class="history-lao">${idx + 1}. ${item.lao}</span>
                    <br><span class="history-ans">正解: ${item.correct}</span>
                </div>
                <span class="history-status ${statusClass}">${statusText}</span>
            `;
            historyList.appendChild(div);
        });

        showScreen('result-screen');
        sendToGAS(score, TOTAL_QUESTIONS);
    }

    async function sendToGAS(score, total) {
        const msg = document.getElementById('sending-msg');
        if (!GAS_URL || GAS_URL.includes("ここ")) {
            msg.textContent = "※GASのURLが設定されていないため、送信をスキップしました。";
            return;
        }

        try {
            // フォーム形式で送信（GASが最も確実に受け取れる形式）
            const formData = new URLSearchParams();
            formData.append('correct', score);
            formData.append('total', total);
            formData.append('deviceId', deviceId);
            formData.append('timestamp', new Date().toLocaleString("ja-JP"));

            const response = await fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: formData.toString()
            });
            
            // no-cors モードではレスポンスの中身は見えないが、リクエストは送信される
            msg.textContent = "結果をスプレッドシートに送信しました。";
            msg.style.color = "var(--success-color)";
            console.log("Data sent to GAS: correct=" + score + ", total=" + total + ", deviceId=" + deviceId);
        } catch (err) {
            msg.textContent = "送信に失敗しました。URLの設定を確認してください。";
            msg.style.color = "var(--error-color)";
            console.error("Error sending data to GAS:", err);
        }
    }

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    window.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            const submitBtn = document.getElementById('submit-btn');
            const nextBtn = document.getElementById('next-btn');
            const quizScreen = document.getElementById('quiz-screen');
            
            if (quizScreen.classList.contains('active')) {
                if (submitBtn.style.display !== 'none') {
                    checkAnswer();
                } else if (nextBtn.style.display !== 'none') {
                    nextQuestion();
                }
            }
        }
    });
</script>

</body>
</html>
